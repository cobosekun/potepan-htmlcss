<script>
const images = document.querySelectorAll('.LearningSystemDetail__image');
const listItems = document.querySelectorAll('.LearningSystemDetailListItem');

listItems.forEach(function(listItem) {
  listItem.addEventListener('click', function() {
    const target = this.getAttribute('data-target');

    listItems.forEach(function(item) {
      item.classList.remove('LearningSystemDetailListItem--active');
    });

    listItem.classList.add('LearningSystemDetailListItem--active');

    images.forEach(function(img) {
      img.classList.remove('LearningSystemDetail__image--active');
    });

    document.querySelector(`.LearningSystemDetail__image[data-image="${target}"]`).classList.add('LearningSystemDetail__image--active');
  });
});
</script>
